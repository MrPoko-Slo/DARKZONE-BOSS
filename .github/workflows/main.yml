name: Build DarkzoneBoss Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Create project structure
      run: |
        mkdir -p src/main/java/com/darkzone/boss
        mkdir -p src/main/resources
        mv BossListener.java src/main/java/com/darkzone/boss/
        mv DarkzoneBossPlugin.java src/main/java/com/darkzone/boss/
        mv SpawnBossCommand.java src/main/java/com/darkzone/boss/
        mv plugin.yml src/main/resources/
        mv config.yml src/main/resources/

    - name: Create pom.xml
      shell: python3 {0}
      run: |
        pom = (
          '\n'
          '\n'
          '4.0.0\n'
          'com.darkzone\n'
          'DarkzoneBoss\n'
          '1.0.0\n'
          'jar\n'
          '\n'
          'papermc'
          'https://repo.papermc.io/repository/maven-public/'
          '\n'
          '\n'
          '\n'
          '\n'
          'io.papermc.paper\n'
          'paper-api\n'
          '1.21.1-R0.1-SNAPSHOT\n'
          'provided\n'
          '\n'
          '\n'
          '\n'
          'org.apache.maven.plugins\n'
          'maven-compiler-plugin\n'
          '3.11.0\n'
          '2121\n'
          '\n'
          '\n'
          '21\n'
          '21\n'
          'UTF-8\n'
          '\n'
          '\n'
        )
        with open("pom.xml", "w") as f:
          f.write(pom)

    - name: Build with Maven
      run: mvn clean package

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: DarkzoneBoss
        path: target/DarkzoneBoss-1.0.0.jar
