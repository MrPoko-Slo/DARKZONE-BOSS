name: Build DarkzoneBoss Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Create project structure
      run: |
        mkdir -p src/main/java/com/darkzone/boss
        mkdir -p src/main/resources
        mv BossListener.java src/main/java/com/darkzone/boss/
        mv DarkzoneBossPlugin.java src/main/java/com/darkzone/boss/
        mv SpawnBossCommand.java src/main/java/com/darkzone/boss/
        mv plugin.yml src/main/resources/
        mv config.yml src/main/resources/

    - name: Create pom.xml
      run: |
        cat > pom.xml << 'EOF'
        
        
            4.0.0
            com.darkzone
            DarkzoneBoss
            1.0.0
            jar
            
                
                    papermc
                    https://repo.papermc.io/repository/maven-public/
                
            
            
                
                    io.papermc.paper
                    paper-api
                    1.21.1-R0.1-SNAPSHOT
                    provided
                
            
            
                
                    
                        org.apache.maven.plugins
                        maven-compiler-plugin
                        3.11.0
                        
                            21
                            21
                        
                    
                
            
            
                21
                21
                UTF-8
            
        
        EOF

    - name: Build with Maven
      run: mvn clean package

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: DarkzoneBoss
        path: target/DarkzoneBoss-1.0.0.jar
